<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instalador Plataforma GEM</title>
    
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --brand-bg: #ffffff;
            --brand-accent: #0284c7;
            --brand-text: #1e293b;
            --brand-subtext: #64748b;
            --grid-bg: #f1f5f9;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .store-wrapper {
            width: 90%;
            max-width: 380px;
            background: white;
            padding: 40px 30px;
            border-radius: 40px;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .app-icon {
            width: 96px;
            height: 96px;
            border-radius: 24px;
            margin-bottom: 20px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.06);
        }

        h1 { margin: 0; font-size: 22px; font-weight: 800; color: var(--brand-text); }
        .provider { color: var(--brand-accent); font-weight: 700; font-size: 13px; margin-top: 4px; }

        .status-container {
            margin: 25px 0;
            padding: 15px;
            background: var(--grid-bg);
            border-radius: 20px;
        }

        #status-text {
            font-size: 14px;
            color: var(--brand-subtext);
            font-weight: 500;
        }

        /* O BOTÃO SÓ APARECE SE FOR INSTALÁVEL */
        #btn-instalar {
            display: none;
            width: 100%;
            height: 58px;
            border-radius: 18px;
            border: none;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        #btn-instalar:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <div class="store-wrapper">
        <img src="icons/icon-1.png" alt="Icon" class="app-icon" onerror="this.src='https://via.placeholder.com/96'">
        <h1>Plataforma GEM</h1>
        <div class="provider">PontoComStore</div>

        <div class="status-container">
            <span id="status-text">Verificando compatibilidade...</span>
        </div>

        <button id="btn-instalar">INSTALAR PORTAL AGORA</button>
        
        <p id="msg-instalado" style="display:none; color: #059669; font-weight: 600; font-size: 14px;">
            ✓ O aplicativo já está instalado neste dispositivo.
        </p>
    </div>

    <script>
        let deferredPrompt;
        const btnInstalar = document.getElementById('btn-instalar');
        const statusText = document.getElementById('status-text');
        const msgInstalado = document.getElementById('msg-instalado');

        // FUNÇÃO PARA DESCOBRIR SE JÁ ESTÁ INSTALADO
        function getPWADisplayMode() {
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
            if (document.referrer.startsWith('android-app://')) return 'twa';
            if (window.navigator.standalone || isStandalone) return 'standalone';
            return 'browser';
        }

        function checkInstallation() {
            const mode = getPWADisplayMode();
            if (mode === 'standalone' || localStorage.getItem('pwa_confirmed') === 'true') {
                statusText.style.display = 'none';
                btnInstalar.style.display = 'none';
                msgInstalado.style.display = 'block';
            } else {
                statusText.innerText = "Disponível para instalação";
            }
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            
            // Se cair aqui, o navegador confirmou que o manifest/SW estão OK
            if (getPWADisplayMode() === 'browser') {
                btnInstalar.style.display = 'block';
                statusText.style.display = 'none';
            }
        });

        btnInstalar.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    localStorage.setItem('pwa_confirmed', 'true');
                    checkInstallation();
                }
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            localStorage.setItem('pwa_confirmed', 'true');
            checkInstallation();
        });

        // Registro do Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }

        window.addEventListener('load', checkInstallation);
    </script>
</body>
</html>
