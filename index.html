<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoComStore - GEM GM Central</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --google-blue: #4285f4;
            --google-green: #01875f;
            --text-main: #202124;
            --text-sub: #5f6368;
        }
        body {
            margin: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #fff; color: var(--text-main);
            display: flex; justify-content: center; padding-top: 40px;
        }
        .store-container { width: 90%; max-width: 400px; }
        .app-header { display: flex; gap: 20px; align-items: center; margin-bottom: 25px; }
        .app-icon {
            width: 80px; height: 80px; border-radius: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .app-info h1 { margin: 0; font-size: 22px; font-weight: 500; }
        .app-info p { margin: 2px 0; color: var(--google-green); font-size: 14px; font-weight: 500; }
        
        .stats { 
            display: flex; justify-content: space-around; 
            padding: 15px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee;
            margin-bottom: 25px; text-align: center; font-size: 12px;
        }

        /* The Dynamic Button */
        #main-action-btn {
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background-color: var(--google-green); color: white;
            font-weight: 500; font-size: 16px; cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-abrir { background-color: var(--google-blue) !important; }

        .description { margin-top: 25px; }
        .description h2 { font-size: 16px; margin-bottom: 8px; }
        .description p { font-size: 14px; color: var(--text-sub); line-height: 1.5; }
    </style>
</head>
<body>

    <div class="store-container">
        <div class="app-header">
            <img src="icons/icon-1.png" alt="Icon" class="app-icon">
            <div class="app-info">
                <h1>GEM GM Central</h1>
                <p>PontoComStore</p>
            </div>
        </div>

        <div class="stats">
            <div><b>4.9 ★</b><br><span style="color:var(--text-sub)">Avaliações</span></div>
            <div><b>15 MB</b><br><span style="color:var(--text-sub)">Tamanho</span></div>
            <div><b>Livre</b><br><span style="color:var(--text-sub)">Classificação</span></div>
        </div>

        <button id="main-action-btn">VERIFICANDO...</button>

        <div class="description">
            <h2>Sobre o app</h2>
            <p>Plataforma completa para o GEM Guararema Central. Gerencie lições, acesse o assistente de IA e acompanhe os logs administrativos em tempo real.</p>
        </div>
    </div>

    <script>
        let deferredPrompt;
        const actionBtn = document.getElementById('main-action-btn');

        function setButtonToAbrir() {
            actionBtn.innerText = "ABRIR";
            actionBtn.classList.add('btn-abrir');
            actionBtn.onclick = () => { window.location.href = "index.html"; };
        }

        function setButtonToInstalar() {
            actionBtn.innerText = "INSTALAR";
            actionBtn.classList.remove('btn-abrir');
            actionBtn.onclick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        localStorage.setItem('gem-pwa-installed', 'true');
                        setButtonToAbrir();
                    }
                    deferredPrompt = null;
                } else {
                    alert("Para instalar, toque nos três pontos do navegador e selecione 'Instalar Aplicativo' ou 'Adicionar à tela de início'.");
                }
            };
        }

        // Deep check for installation
        function checkStatus() {
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
            const wasInstalled = localStorage.getItem('gem-pwa-installed') === 'true';
            
            // If already in the app OR we marked it as installed before
            if (isStandalone || wasInstalled) {
                setButtonToAbrir();
            } else {
                setButtonToInstalar();
            }
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // If this event triggers, the browser is sure it's NOT installed yet
            setButtonToInstalar();
        });

        window.addEventListener('appinstalled', () => {
            localStorage.setItem('gem-pwa-installed', 'true');
            setButtonToAbrir();
        });

        // Run check on load
        window.addEventListener('load', checkStatus);
    </script>
</body>
</html>
