<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoComStore - GEM GM Central</title>
    
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            /* Custom Palette: Deep Navy & Electric Blue (Non-Google) */
            --brand-bg: #0f172a;
            --brand-accent: #38bdf8;
            --brand-success: #10b981;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--brand-bg);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .store-wrapper {
            width: 90%;
            max-width: 380px;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .app-icon {
            width: 90px;
            height: 90px;
            border-radius: 24px;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.3);
            border: 2px solid var(--brand-accent);
        }

        h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
        .provider { color: var(--brand-accent); font-weight: 600; font-size: 13px; margin-top: 4px; text-transform: uppercase; }

        /* Unique Stats Layout: Vertical Grid instead of horizontal bars */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 25px 0;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 16px;
            font-size: 12px;
        }
        .stat-card b { display: block; font-size: 16px; color: var(--brand-accent); }

        /* Unified Action Button */
        .action-area { height: 55px; margin-top: 10px; }
        
        #btn-instalar, #btn-abrir {
            width: 100%;
            height: 100%;
            border-radius: 14px;
            border: none;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            display: none;
        }

        #btn-instalar {
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white;
        }

        #btn-abrir {
            background: transparent;
            border: 2px solid var(--brand-accent);
            color: var(--brand-accent);
        }

        #btn-instalar:active, #btn-abrir:active { transform: scale(0.96); }

        .description { text-align: left; margin-top: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .description h2 { font-size: 15px; color: var(--text-secondary); margin-bottom: 10px; }
        .description p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin: 0; }
    </style>
</head>
<body>

    <div class="store-wrapper">
        <img src="icons/icon-1.png" alt="GEM Icon" class="app-icon">
        <h1>GEM GM Central</h1>
        <div class="provider">PontoComStore</div>

        <div class="stats-grid">
            <div class="stat-card"><b>4.9</b>Avaliação</div>
            <div class="stat-card"><b>PWA</b>Plataforma</div>
            <div class="stat-card" style="grid-column: span 2;"><b>Guararema Central</b>Localização</div>
        </div>

        <div class="action-area">
            <button id="btn-instalar">INSTALAR PORTAL</button>
            <button id="btn-abrir" onclick="window.location.href='index.html'">ABRIR APLICATIVO</button>
        </div>

        <div class="description">
            <h2>DETALHES</h2>
            <p>Ecossistema administrativo e educacional para instrutores GEM. Inclui módulos de teoria, prática instrumental e suporte inteligente.</p>
        </div>
    </div>

    <script>
        let deferredPrompt;
        const btnInstalar = document.getElementById('btn-instalar');
        const btnAbrir = document.getElementById('btn-abrir');
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        function checkStatus() {
            // Priority check: are we already inside the installed app?
            if (isStandalone || localStorage.getItem('pwa-installed') === 'true') {
                btnInstalar.style.display = 'none';
                btnAbrir.style.display = 'block';
            }
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (!isStandalone) {
                btnInstalar.style.display = 'block';
                btnAbrir.style.display = 'none';
            }
        });

        btnInstalar.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    localStorage.setItem('pwa-installed', 'true');
                    checkStatus();
                }
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            localStorage.setItem('pwa-installed', 'true');
            checkStatus();
        });

        window.addEventListener('load', checkStatus);
    </script>
</body>
</html>
