<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoComStore - Dicionário Local AI</title>
    
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    
    <script src="data_dictionary.js"></script>
    <script src="data_enciclopedia.js"></script>
    <link rel="stylesheet" href="style.css">

    <style>
        /* Store Header Styles */
        #pwa-store-header {
            background: #f8f9fa;
            padding: 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: sans-serif;
        }
        .store-btn {
            padding: 10px 20px;
            border-radius: 6px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            color: white;
            text-transform: uppercase;
        }
        .btn-install { background: #01875f; }
        .btn-open { background: #4285f4; }
        
        /* State Handling */
        .hidden { display: none !important; }
        #installed-view {
            text-align: center;
            padding: 50px 20px;
        }
    </style>
</head>
<body>

<div id="pwa-store-header">
    <div style="display: flex; align-items: center; gap: 10px;">
        <img src="icons/icon-1.png" style="width: 40px; border-radius: 8px;">
        <div>
            <div style="font-weight: bold; font-size: 14px;">PontoComStore</div>
            <div style="font-size: 11px; color: #666;">Dicionário Local AI</div>
        </div>
    </div>
    <button id="main-store-btn" class="store-btn btn-install">Instalar</button>
</div>

<div id="app-container">
    <h2 style="text-align:center">AI Dictation & Typing</h2>
    
    <h3>🎤 Ditado por Voz</h3>
    <p id="status">Clique em Iniciar para ditar...</p>
    <div id="transcript-box" class="display-box"></div>
    <div class="controls">
        <button id="start-btn">Iniciar Ditado</button>
        <button id="stop-btn" disabled>Parar</button>
    </div>

    <hr style="margin: 30px 0; border: 0; border-top: 1px solid #eee;">

    <h3 class="ai-header"><span>🤖</span> AI Encyclopedia</h3>
    <input type="text" id="ai-search" class="ai-search-input" placeholder="Pesquisar...">
    <div id="ai-box" class="display-box">
        <div id="ai-content"><i>Aguardando comando ou busca...</i></div>
    </div>

    <div id="typing-input" contenteditable="true" style="min-height: 100px; border: 1px solid #ccc; margin-top: 20px; padding: 10px;"></div>
</div>

<div id="installed-view" class="hidden">
    <img src="icons/icon-1.png" style="width: 100px; border-radius: 20px; margin-bottom: 20px;">
    <h2>GEM GM Central</h2>
    <p style="color: #666;">O aplicativo já está instalado no seu dispositivo.</p>
    <button class="store-btn btn-open" onclick="location.reload()" style="width: 200px; height: 50px;">ABRIR AGORA</button>
</div>

<script>
    let deferredPrompt;
    const storeBtn = document.getElementById('main-store-btn');
    const appContainer = document.getElementById('app-container');
    const installedView = document.getElementById('installed-view');

    // 1. Check if App is already installed or running in Standalone
    function checkPWAStatus() {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches 
                            || window.navigator.standalone 
                            || localStorage.getItem('gem-pwa-installed') === 'true';

        if (isStandalone) {
            // Logic: Maintain button as ABRIR and CLEAN the rest
            storeBtn.innerText = "ABRIR";
            storeBtn.className = "store-btn btn-open";
            
            appContainer.classList.add('hidden'); // Clean/Hide the editor
            installedView.classList.remove('hidden'); // Show the simple portal
            
            storeBtn.onclick = () => { location.reload(); };
        } else {
            // App is NOT installed: Show full UI and INSTALL button
            storeBtn.innerText = "INSTALAR";
            storeBtn.className = "store-btn btn-install";
            appContainer.classList.remove('hidden');
            installedView.classList.add('hidden');
            
            storeBtn.onclick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        localStorage.setItem('gem-pwa-installed', 'true');
                        checkPWAStatus();
                    }
                    deferredPrompt = null;
                } else {
                    alert("Para instalar, use o menu do seu navegador.");
                }
            };
        }
    }

    // Capture the install prompt
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        checkPWAStatus();
    });

    // Handle post-install event
    window.addEventListener('appinstalled', () => {
        localStorage.setItem('gem-pwa-installed', 'true');
        checkPWAStatus();
    });

    // Initial check on load
    window.addEventListener('load', checkPWAStatus);
</script>

<script src="main.js"></script>

</body>
</html>
