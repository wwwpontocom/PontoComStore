<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoComStore - GEM GM Central</title>
    
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --google-blue: #4285f4;
            --google-green: #01875f;
            --text-main: #202124;
            --text-sub: #5f6368;
        }
        body {
            margin: 0; font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #fff; color: var(--text-main);
            display: flex; flex-direction: column; align-items: center; padding-top: 60px;
        }
        .store-wrapper { width: 90%; max-width: 400px; text-align: center; }
        
        .app-icon {
            width: 100px; height: 100px; border-radius: 22px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 15px;
        }
        h1 { margin: 0; font-size: 24px; font-weight: 500; }
        .provider { color: var(--google-green); font-weight: 500; margin-top: 5px; font-size: 14px; }

        .stats-bar {
            display: flex; justify-content: space-around;
            margin: 30px 0; padding: 10px 0;
            border-top: 1px solid #eee; border-bottom: 1px solid #eee;
        }
        .stat-node { font-size: 12px; color: var(--text-sub); }
        .stat-node b { color: var(--text-main); display: block; font-size: 14px; }

        /* Sync with index.html logic */
        #btn-instalar {
            display: none; /* Hidden by default, just like index.html */
            width: 100%; padding: 12px; border-radius: 8px; border: none;
            background-color: var(--google-green); color: white;
            font-weight: bold; font-size: 16px; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #btn-abrir {
            display: none;
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #dadce0;
            background-color: #fff; color: var(--google-blue);
            font-weight: bold; font-size: 16px; cursor: pointer;
        }

        .description { text-align: left; margin-top: 30px; }
        .description h2 { font-size: 16px; }
        .description p { font-size: 14px; color: var(--text-sub); line-height: 1.5; }
    </style>
</head>
<body>

    <div class="store-wrapper">
        <img src="icons/icon-1.png" alt="App Icon" class="app-icon">
        <h1>GEM GM Central</h1>
        <div class="provider">PontoComStore</div>

        <div class="stats-bar">
            <div class="stat-node"><b>4.9 ★</b>Avaliações</div>
            <div class="stat-node"><b>PWA</b>Tecnologia</div>
            <div class="stat-node"><b>Livre</b>Classificação</div>
        </div>

        <button id="btn-instalar">INSTALAR</button>
        <button id="btn-abrir" onclick="window.location.href='index.html'">ABRIR</button>

        <div class="description">
            <h2>Sobre este aplicativo</h2>
            <p>Plataforma de gestão e ensino musical para o GEM Guararema Central. Acesse cronogramas, lições do MSA e suporte via Assistente de IA.</p>
        </div>
    </div>

    <script>
        let deferredPrompt;
        const btnInstalar = document.getElementById('btn-instalar');
        const btnAbrir = document.getElementById('btn-abrir');

        // Check if already in standalone mode (installed)
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        function checkStatus() {
            if (isStandalone || localStorage.getItem('pwa-installed') === 'true') {
                btnInstalar.style.display = 'none';
                btnAbrir.style.display = 'block';
            }
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            // Prevent Chrome 67 and earlier from automatically showing the prompt
            e.preventDefault();
            deferredPrompt = e;
            
            // Only show install button if not already standalone
            if (!isStandalone) {
                btnInstalar.style.display = 'block';
                btnAbrir.style.display = 'none';
            }
        });

        btnInstalar.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    localStorage.setItem('pwa-installed', 'true');
                    btnInstalar.style.display = 'none';
                    btnAbrir.style.display = 'block';
                }
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            localStorage.setItem('pwa-installed', 'true');
            btnInstalar.style.display = 'none';
            btnAbrir.style.display = 'block';
            console.log('PWA instalado com sucesso');
        });

        // Run check on load
        window.addEventListener('load', checkStatus);
    </script>
</body>
</html>
