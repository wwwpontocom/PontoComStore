<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instalador PWA - GEM</title>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        /* CSS Necessário para o posicionamento e estilo do botão */
        #btn-instalar {
            display: none; /* Inicia escondido, a lógica JS o revela */
            background: #27ae60;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <button id="btn-instalar">INSTALAR APLICATIVO</button>

    <script>
        let deferredPrompt;
        const btnInstalar = document.getElementById('btn-instalar');

        // 1. Escuta o evento que indica que o app pode ser instalado
        window.addEventListener('beforeinstallprompt', (e) => {
            // Previne o banner padrão do navegador
            e.preventDefault();
            // Guarda o evento para ser disparado pelo nosso botão
            deferredPrompt = e;
            // Mostra o nosso botão customizado
            btnInstalar.style.display = 'block';
        });

        // 2. Lógica de clique no botão
        btnInstalar.addEventListener('click', async () => {
            if (deferredPrompt) {
                // Mostra o prompt de instalação
                deferredPrompt.prompt();
                
                // Verifica a escolha do usuário
                const { outcome } = await deferredPrompt.userChoice;
                console.log(`Escolha do usuário: ${outcome}`);
                
                // Limpa o prompt (só pode ser usado uma vez)
                deferredPrompt = null;
                // Esconde o botão após o uso
                btnInstalar.style.display = 'none';
            }
        });

        // 3. Esconde o botão se o app já estiver instalado
        window.addEventListener('appinstalled', () => {
            btnInstalar.style.display = 'none';
            deferredPrompt = null;
            console.log('PWA instalado com sucesso!');
        });

        // 4. Registro do Service Worker (Essencial para PWA)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker ativo!', reg))
                    .catch(err => console.log('Erro ao registrar SW', err));
            });
        }
    </script>
</body>
</html>
