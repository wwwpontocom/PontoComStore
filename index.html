<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoComStore - GEM GM Central</title>
    
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --brand-bg: #ffffff;
            --brand-accent: #0284c7;
            --brand-text: #1e293b;
            --brand-subtext: #64748b;
            --card-bg: #ffffff;
            --grid-bg: #f1f5f9;
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--brand-bg);
            color: var(--brand-text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .store-wrapper {
            width: 95%;
            /* INCREASED WIDTH STILL MORE: 600px */
            max-width: 600px; 
            background: var(--card-bg);
            /* HIGH PADDING MAINTAINED */
            padding: 60px 110px; 
            border-radius: 50px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.07);
            text-align: center;
            border: 1px solid #f1f5f9;
            box-sizing: border-box;
        }

        .app-icon {
            width: 84px;
            height: 84px;
            border-radius: 22px;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
        }

        h1 { 
            margin: 0; 
            font-size: 24px; /* Increased for wider layout */
            font-weight: 800; 
            letter-spacing: -0.5px; 
            line-height: 1.2;
        }

        .provider { 
            color: var(--brand-accent); 
            font-weight: 700; 
            font-size: 12px; 
            margin-top: 10px; 
            text-transform: ; 
            letter-spacing: 2px; 
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin: 35px 0;
        }

        .stat-card {
            background: var(--grid-bg);
            padding: 18px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--brand-subtext);
        }

        .stat-card b { 
            display: block; 
            font-size: 16px; 
            color: var(--brand-text); 
            margin-bottom: 4px;
        }

        .action-area { min-height: 60px; margin-top: 15px; }
        
        #btn-instalar, #btn-abrir {
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            border: none;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
            letter-spacing: 0.5px;
        }

        #btn-instalar {
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
        }

        #btn-abrir {
            background: #ffffff;
            border: 2px solid var(--grid-bg);
            color: var(--brand-text);
        }

        #btn-instalar:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .description { 
            text-align: left; 
            margin-top: 35px; 
            border-top: 1px solid #f1f5f9; 
            padding-top: 25px; 
        }

        .description h2 { 
            font-size: 12px; 
            color: var(--brand-text); 
            text-transform: uppercase; 
            margin-bottom: 10px; 
            letter-spacing: 1px;
        }

        .description p { 
            font-size: 13px; 
            color: var(--brand-subtext); 
            line-height: 1.6; 
            margin: 0; 
        }

        @media (max-width: 650px) {
            .store-wrapper { padding: 50px 60px; }
        }
        @media (max-width: 400px) {
            .store-wrapper { padding: 40px 30px; border-radius: 30px; }
        }
    </style>
</head>
<body>

    <div class="store-wrapper">
        <img src="icons/icon-1.png" alt="GEM Icon" class="app-icon">
        <h1>Plataforma GEM GM Central</h1>
        <div class="provider">PontoComStore</div>

        <div class="stats-grid">
            <div class="stat-card"><b>GEM</b>Grupo de Estudos Musicais</div>
            <div class="stat-card"><b>Localidade</b>Guararema Central</div>
        </div>

        <div class="action-area">
            <button id="btn-instalar">INSTALAR PORTAL</button>
            <button id="btn-abrir" onclick="window.location.href='index.html'">ABRIR APLICATIVO</button>
        </div>

        <div class="description">
            <h2>Sobre</h2>
            <p>Plataforma para instrutores. Teoria musical, cronogramas e Assistente de IA integrados.</p>
        </div>
    </div>

    <script>
        let deferredPrompt;
        const btnInstalar = document.getElementById('btn-instalar');
        const btnAbrir = document.getElementById('btn-abrir');
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

        function checkStatus() {
            if (isStandalone || localStorage.getItem('pwa-installed') === 'true') {
                btnInstalar.style.display = 'none';
                btnAbrir.style.display = 'block';
            }
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            if (!isStandalone) {
                btnInstalar.style.display = 'block';
                btnAbrir.style.display = 'none';
            }
        });

        btnInstalar.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    localStorage.setItem('pwa-installed', 'true');
                    checkStatus();
                }
                deferredPrompt = null;
            }
        });

        window.addEventListener('appinstalled', () => {
            localStorage.setItem('pwa-installed', 'true');
            checkStatus();
        });

        window.addEventListener('load', checkStatus);
    </script>
</body>
</html>
